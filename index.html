<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Instagram Health Checker</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{

background:#0d6efd;

display:flex;

justify-content:center;

align-items:center;

height:100vh;

padding:20px;

}

.box{

background:white;

width:100%;

max-width:400px;

padding:25px;

border-radius:20px;

text-align:center;

box-shadow:0 15px 40px rgba(0,0,0,.25);

}

h1{

margin-bottom:10px;

color:#0d6efd;

}

p{

margin-bottom:20px;

color:#666;

}

input{

width:100%;

padding:15px;

border-radius:10px;

border:1px solid #ddd;

font-size:16px;

margin-bottom:15px;

}

button{

width:100%;

padding:15px;

background:#0d6efd;

color:white;

border:none;

border-radius:10px;

font-size:17px;

font-weight:bold;

cursor:pointer;

}

#result{

display:none;

margin-top:25px;

}

#score{

font-size:40px;

font-weight:bold;

color:#0d6efd;

margin-bottom:10px;

}

a{

display:inline-block;

margin-top:20px;

background:red;

color:white;

padding:12px 20px;

border-radius:10px;

text-decoration:none;

}

</style>

</head>

<body>

<div class="box">

<h1>Instagram Health Checker</h1>

<p>
<script>

function checkScore(){

let username=document.getElementById("username").value;

if(username==""){

alert("Please enter Instagram username");

return;

}

document.getElementById("result").style.display="block";

let score=Math.floor(Math.random()*41)+55;

document.getElementById("score").innerHTML=score+"/100";

let msg="";

if(score>=90){

msg="🔥 Excellent! Your profile is highly optimized.";

}

else if(score>=75){

msg="✅ Good Profile! Small improvements can boost your growth.";

}

else{

msg="⚠️ Your profile needs optimization. Watch the tutorial below.";

}

document.getElementById("message").innerHTML=msg;

}

</script>

</div>

</body>

</html>
